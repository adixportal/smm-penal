<!DOCTYPE html>
<html>
<head>
<title>SMM Panel</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#f4f7fb;
}

/* NAVBAR */
.nav{
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:white;
  border-bottom:1px solid #eee;
}

.logo{
  font-weight:600;
}

.nav a{
  margin-left:20px;
  color:#2563eb;
  text-decoration:none;
}

/* CENTER */
.main{
  display:flex;
  justify-content:center;
  align-items:center;
  height:85vh;
}

/* CARD */
.card{
  width:380px;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card h2{
  margin-bottom:20px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  cursor:pointer;
}

.login{background:#2563eb;color:white;}
.signup{background:#16a34a;color:white;}
.google{background:#ea4335;color:white;}

</style>
</head>

<body>

<div class="nav">
  <div class="logo">🚀 SMM PANEL</div>
  <div>
    <a href="#">Login</a>
    <a href="#">Register</a>
  </div>
</div>

<div class="main">
  <div class="card">

    <h2>Welcome Back</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="btn login" onclick="login()">Login</button>
    <button class="btn signup" onclick="signup()">Register</button>
    <button class="btn google" onclick="googleLogin()">Google Login</button>

  </div>
</div>

<script type="module" src="firebase.js"></script>

</body>
</html>
