<!DOCTYPE html>
<html>
<head>
  <title>SMM Panel</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    }

    .left {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      flex-direction: column;
    }

    .left h1 {
      font-size: 42px;
      margin: 0;
    }

    .right {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
    }

    .box {
      width: 320px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1e40af;
    }

    .signup {
      background: #16a34a;
    }

  </style>
</head>

<body>

<div class="left">
  <h1>SMM PANEL 🚀</h1>
  <p>Grow faster. Earn smarter.</p>
</div>

<div class="right">
  <div class="box">

    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button class="signup" onclick="signup()">Signup</button>

  </div>
</div>

<script type="module" src="firebase.js"></script>

</body>
</html>
