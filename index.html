<!DOCTYPE html>
<html>
<head>
  <title>SMM Panel Login</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #2a5298;
      color: white;
      cursor: pointer;
    }

    .signup {
      background: #28a745;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>SMM Panel 🔥</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button class="signup" onclick="signup()">Signup</button>
</div>

<script type="module" src="firebase.js"></script>

</body>
</html>
