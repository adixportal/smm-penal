<!DOCTYPE html>
<html>
<head>
  <title>SMM Panel Login</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      display:flex;
      height:100vh;
    }

    /* LEFT SIDE */
    .left {
      flex:1;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      flex-direction:column;
    }

    .left h1 {
      font-size:40px;
    }

    /* RIGHT SIDE */
    .right {
      flex:1;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f5f6fa;
    }

    .box {
      background:white;
      padding:40px;
      border-radius:10px;
      width:300px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
      text-align:center;
    }

    .box h2 {
      margin-bottom:20px;
    }

    input {
      width:100%;
      padding:10px;
      margin:10px 0;
      border-radius:6px;
      border:1px solid #ccc;
    }

    button {
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:6px;
      background:#40739e;
      color:white;
      cursor:pointer;
    }

    button:hover {
      background:#273c75;
    }

    .signup {
      background:#44bd32;
    }

    .signup:hover {
      background:#2ecc71;
    }
  </style>
</head>

<body>

<!-- LEFT -->
<div class="left">
  <h1>SMM PANEL 🚀</h1>
  <p>Grow your social media instantly</p>
</div>

<!-- RIGHT -->
<div class="right">
  <div class="box">

    <h2>Login</h2>

    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>
    <button class="signup" onclick="signup()">Signup</button>

  </div>
</div>

<script type="module" src="firebase.js"></script>

</body>
</html>
