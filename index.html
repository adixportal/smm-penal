<!DOCTYPE html>
<html>
<head>
<title>SMM Panel</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  height:100vh;
  display:flex;
}

/* LEFT SIDE */
.left {
  flex:1;
  background: linear-gradient(135deg,#1e3a8a,#2563eb);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.left h1 {
  font-size:42px;
  margin:0;
}

.left p {
  margin-top:10px;
  opacity:0.8;
}

/* RIGHT SIDE */
.right {
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f8fafc;
}

.box {
  width:340px;
  padding:30px;
  background:white;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.box h2 {
  margin-bottom:20px;
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

button:hover {
  background:#1e40af;
}

.signup {
  background:#16a34a;
}

</style>
</head>

<body>

<div class="left">
  <h1>🚀 SMM PANEL</h1>
  <p>Boost your social media growth instantly</p>
</div>

<div class="right">
  <div class="box">

    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button class="signup" onclick="signup()">Signup</button>

  </div>
</div>

<script type="module" src="firebase.js"></script>

</body>
</html>
