<!DOCTYPE html>
<html>
<head>
<title>SMM Panel</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  display:flex;
  background:#f1f5f9;
}

/* SIDEBAR */
.sidebar {
  width:240px;
  background:#111827;
  color:white;
  height:100vh;
  padding:20px;
  position:fixed;
}

.sidebar h2 {
  text-align:center;
}

.sidebar button {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  background:#1f2937;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.sidebar button:hover {
  background:#2563eb;
}

/* MAIN */
.main {
  margin-left:240px;
  padding:20px;
  width:100%;
}

/* TOPBAR */
.topbar {
  background:white;
  padding:15px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.section {display:none;}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button.action {
  padding:10px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>SMM PANEL</h2>

  <button onclick="show('home')">Dashboard</button>
  <button onclick="show('services')">Services</button>
  <button onclick="show('order')">New Order</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

  <div class="topbar">
    <h3>Welcome 👋</h3>
    <h3>Balance: ₹<span id="balance">0</span></h3>
  </div>

  <!-- DASHBOARD -->
  <div id="home" class="section">
    <div class="grid">
      <div class="card">Total Orders: 0</div>
      <div class="card">Pending Orders: 0</div>
      <div class="card">Completed Orders: 0</div>
    </div>
  </div>

  <!-- SERVICES -->
  <div id="services" class="section">
    <div class="card">
      Instagram Followers - ₹100<br><br>
      Instagram Likes - ₹50
    </div>
  </div>

  <!-- ORDER -->
  <div id="order" class="section">
    <div class="card">
      <h3>Place Order</h3>
      <input placeholder="Enter link">
      <input placeholder="Quantity">
      <button class="action">Submit</button>
    </div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpA9ZGfWyWVsY1PsYL19dOf_CZsjPDUoM",
  authDomain: "smm-penal-6a0c0.firebaseapp.com",
  projectId: "smm-penal-6a0c0",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// section switch
window.show = function(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}
show("home");

// user
onAuthStateChanged(auth, async(user)=>{
  if(user){
    let ref = doc(db,"users",user.uid);
    let snap = await getDoc(ref);

    if(snap.exists()){
      document.getElementById("balance").innerText = snap.data().balance;
    }else{
      await setDoc(ref,{email:user.email,balance:1000});
      document.getElementById("balance").innerText = 1000;
    }
  }else{
    window.location.href="index.html";
  }
});

// logout
window.logout = function(){
  signOut(auth).then(()=>{
    window.location.href="index.html";
  });
}

</script>

</body>
</html>
