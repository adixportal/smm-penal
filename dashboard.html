<!DOCTYPE html>
<html>
<head>
<title>SMM Panel</title>

<style>
body {
  margin:0;
  font-family:Arial;
  display:flex;
  background:#f5f6fa;
}

/* Sidebar */
.sidebar {
  width:240px;
  background:#2f3640;
  color:white;
  height:100vh;
  padding:20px;
}

.sidebar h2 {
  text-align:center;
}

.sidebar button {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  background:#353b48;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.sidebar button:hover {
  background:#40739e;
}

/* Main */
.main {
  flex:1;
  padding:20px;
}

.topbar {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
  display:flex;
  justify-content:space-between;
}

.card {
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.section {
  display:none;
}
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>SMM Panel</h2>

  <button onclick="show('home')">🏠 Dashboard</button>
  <button onclick="show('services')">📦 Services</button>
  <button onclick="show('order')">🛒 New Order</button>
  <button onclick="show('history')">📜 Orders</button>
  <button onclick="logout()">🚪 Logout</button>
</div>

<!-- Main -->
<div class="main">

  <div class="topbar">
    <h3>Welcome User 👋</h3>
    <h3>Balance: ₹<span id="balance">0</span></h3>
  </div>

  <!-- Dashboard -->
  <div id="home" class="section">
    <div class="card">
      <h2>Dashboard Overview</h2>
      <p>Total Orders: 0</p>
      <p>Pending Orders: 0</p>
    </div>
  </div>

  <!-- Services -->
  <div id="services" class="section">
    <div class="card">
      <h2>Services</h2>
      <p>Instagram Followers - ₹100</p>
      <p>Instagram Likes - ₹50</p>
    </div>
  </div>

  <!-- Order -->
  <div id="order" class="section">
    <div class="card">
      <h2>Place Order</h2>
      <input id="link" placeholder="Enter link"><br><br>
      <input id="qty" placeholder="Quantity"><br><br>
      <button>Submit Order</button>
    </div>
  </div>

  <!-- History -->
  <div id="history" class="section">
    <div class="card">
      <h2>Order History</h2>
      <p>No orders yet</p>
    </div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpA9ZGfWyWVsY1PsYL19dOf_CZsjPDUoM",
  authDomain: "smm-penal-6a0c0.firebaseapp.com",
  projectId: "smm-penal-6a0c0",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Section switch
window.show = function(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

show("home");

// Firebase user
onAuthStateChanged(auth, async(user)=>{
  if(user){
    let ref = doc(db,"users",user.uid);
    let snap = await getDoc(ref);

    if(snap.exists()){
      document.getElementById("balance").innerText = snap.data().balance;
    }else{
      await setDoc(ref,{email:user.email,balance:1000});
      document.getElementById("balance").innerText = 1000;
    }
  }else{
    window.location.href="login.html";
  }
});

// Logout
window.logout = function(){
  signOut(auth).then(()=>{
    window.location.href="login.html";
  });
}

</script>

</body>
</html>
