<!DOCTYPE html>
<html>
<head>
<title>SMM Panel</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  display:flex;
  background:#f4f7fb;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:#111827;
  color:white;
  height:100vh;
  padding:20px;
}

.sidebar h2{
  text-align:center;
  margin-bottom:30px;
}

.menu button{
  width:100%;
  padding:12px;
  margin:8px 0;
  background:#1f2937;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.menu button:hover{
  background:#2563eb;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  font-weight:500;
}

/* SECTIONS */
.section{display:none;}

</style>
</head>

<body>

<div class="sidebar">
  <h2>SMM PANEL</h2>

  <div class="menu">
    <button onclick="show('home')">Dashboard</button>
    <button onclick="show('services')">Services</button>
    <button onclick="show('order')">New Order</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="main">

  <div class="header">
    <div>Welcome 👋</div>
    <div>Balance: ₹<span id="balance">0</span></div>
  </div>

  <div id="home" class="section">
    <div class="cards">
      <div class="card">Total Orders: 0</div>
      <div class="card">Pending: 0</div>
      <div class="card">Completed: 0</div>
    </div>
  </div>

  <div id="services" class="section">
    <div class="card">
      Instagram Followers - ₹100<br><br>
      Instagram Likes - ₹50
    </div>
  </div>

  <div id="order" class="section">
    <div class="card">
      <input placeholder="Link"><br><br>
      <input placeholder="Quantity"><br><br>
      <button>Place Order</button>
    </div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpA9ZGfWyWVsY1PsYL19dOf_CZsjPDUoM",
  authDomain: "smm-penal-6a0c0.firebaseapp.com",
  projectId: "smm-penal-6a0c0",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// section
window.show = function(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}
show("home");

// auth check
onAuthStateChanged(auth,(user)=>{
  if(!user){
    window.location.href="index.html";
  }
});

// logout
window.logout = function(){
  signOut(auth).then(()=>{
    window.location.href="index.html";
  });
}

</script>

</body>
</html>
