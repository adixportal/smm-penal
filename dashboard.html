<!DOCTYPE html>
<html>
<head>
  <title>SMM Panel</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      background: #eef1f7;
    }

    /* SIDEBAR */
    .sidebar {
      width: 230px;
      background: #111827;
      color: white;
      height: 100vh;
      position: fixed;
      display: flex;
      flex-direction: column;
    }

    .logo {
      padding: 20px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      border-bottom: 1px solid #1f2937;
    }

    .menu {
      padding: 10px;
    }

    .menu button {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      border: none;
      background: transparent;
      color: #cbd5e1;
      text-align: left;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    .menu button:hover {
      background: #1f2937;
      color: white;
    }

    /* MAIN */
    .main {
      margin-left: 230px;
      width: 100%;
      padding: 20px;
    }

    /* TOPBAR */
    .topbar {
      background: white;
      padding: 15px 20px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .balance {
      font-weight: bold;
      color: #2563eb;
    }

    /* CARD GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .card h3 {
      margin: 0 0 10px;
    }

    .section {
      display: none;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button.action {
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button.action:hover {
      background: #1e40af;
    }

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">SMM PANEL</div>

  <div class="menu">
    <button onclick="show('home')">🏠 Dashboard</button>
    <button onclick="show('services')">📦 Services</button>
    <button onclick="show('order')">🛒 New Order</button>
    <button onclick="show('history')">📜 Orders</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div>Welcome 👋</div>
    <div class="balance">₹ <span id="balance">0</span></div>
  </div>

  <!-- DASHBOARD -->
  <div id="home" class="section">
    <div class="grid">
      <div class="card">
        <h3>Total Orders</h3>
        <p>0</p>
      </div>
      <div class="card">
        <h3>Pending Orders</h3>
        <p>0</p>
      </div>
      <div class="card">
        <h3>Completed</h3>
        <p>0</p>
      </div>
    </div>
  </div>

  <!-- SERVICES -->
  <div id="services" class="section">
    <div class="card">
      <h3>Services</h3>
      <p>Instagram Followers - ₹100</p>
      <p>Instagram Likes - ₹50</p>
    </div>
  </div>

  <!-- ORDER -->
  <div id="order" class="section">
    <div class="card">
      <h3>Place Order</h3>
      <input placeholder="Enter Link">
      <input placeholder="Quantity">
      <button class="action">Submit Order</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="history" class="section">
    <div class="card">
      <h3>Order History</h3>
      <p>No data</p>
    </div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpA9ZGfWyWVsY1PsYL19dOf_CZsjPDUoM",
  authDomain: "smm-penal-6a0c0.firebaseapp.com",
  projectId: "smm-penal-6a0c0",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// SECTION SWITCH
window.show = function(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}
show("home");

// USER DATA
onAuthStateChanged(auth, async(user)=>{
  if(user){
    let ref = doc(db,"users",user.uid);
    let snap = await getDoc(ref);

    if(snap.exists()){
      document.getElementById("balance").innerText = snap.data().balance;
    }else{
      await setDoc(ref,{email:user.email,balance:1000});
      document.getElementById("balance").innerText = 1000;
    }
  }else{
    window.location.href="./index.html";
  }
});

// LOGOUT
window.logout = function(){
  signOut(auth).then(()=> window.location.href="login.html");
}

</script>

</body>
</html>
